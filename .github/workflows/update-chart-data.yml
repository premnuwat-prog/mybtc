# อัปเดต docs/chart-data.json (ราคา + on-chain) วันละครั้ง ให้เว็บออนไลน์มีข้อมูลกราฟล่าสุด
name: Update chart data
on:
  schedule:
    - cron: "45 1 * * *" # ~08:45 เวลาไทย หลัง bitcoin-data.com อัปเดตข้อมูลของเมื่อวาน
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tools/build-chart-data.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/chart-data.json
          git diff --cached --quiet || (git commit -m "อัปเดตข้อมูลกราฟอัตโนมัติ" && git push)
